<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&L Annotation Layer — alche</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#F5F0E8;--cream-mid:#EDE7DC;--deep:#2C2418;
  --deep-90:rgba(44,36,24,0.9);--deep-70:rgba(44,36,24,0.7);
  --deep-50:rgba(44,36,24,0.5);--deep-30:rgba(44,36,24,0.3);
  --deep-15:rgba(44,36,24,0.15);--deep-08:rgba(44,36,24,0.08);
  --amber:#C4956A;--sage:#8B9E7C;--terra:#B86B4A;
  --rose:#C47A8A;--stone:#9E948A;
  --glass:rgba(255,252,246,0.55);--glass-strong:rgba(255,252,246,0.75);
  --glass-border:rgba(196,149,106,0.18);--glass-border-strong:rgba(196,149,106,0.3);
  --positive:#4A7C59;--negative:#9E3A2A;
}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:#FEFCF9;color:var(--deep);line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 20%,rgba(196,149,106,0.08) 0%,transparent 50%),radial-gradient(ellipse at 85% 80%,rgba(139,158,124,0.06) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(184,107,74,0.03) 0%,transparent 60%);pointer-events:none;z-index:0}

.container{max-width:920px;margin:0 auto;padding:0 24px;position:relative;z-index:1}

/* Nav */
.nav{position:sticky;top:0;z-index:100;background:rgba(254,252,249,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--glass-border);padding:10px 24px;display:flex;justify-content:space-between;align-items:center}
.nav-left{display:flex;align-items:baseline;gap:12px}
.nav-left .wordmark{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600}
.nav-left .tag{font-family:'Space Mono',monospace;font-size:10px;color:var(--deep-50);letter-spacing:0.08em}
.nav-actions{display:flex;gap:6px}

/* Buttons */
.btn{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:8px 20px;border-radius:8px;cursor:pointer;transition:all 0.15s;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-dark{background:var(--deep);color:var(--cream)}
.btn-dark:hover{box-shadow:0 4px 16px rgba(44,36,24,0.25)}
.btn-ghost{background:transparent;color:var(--deep-50);border:1px solid var(--deep-15)}
.btn-ghost:hover{color:var(--deep);border-color:var(--amber)}
.btn-ghost.active{color:var(--amber);border-color:var(--amber);background:rgba(196,149,106,0.06)}

/* Hero */
.hero{padding:48px 0 32px;text-align:center}
.hero-badge{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:var(--amber);background:rgba(196,149,106,0.1);border:1px solid rgba(196,149,106,0.2);border-radius:20px;padding:5px 14px;margin-bottom:16px}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;line-height:1.1;margin-bottom:12px}
.hero h1 strong{font-weight:700}
.hero p{font-size:16px;color:var(--deep-70);max-width:600px;margin:0 auto;line-height:1.6}

/* Section headers */
.sec-header{display:flex;align-items:center;gap:12px;padding:28px 0 12px;border-bottom:2px solid var(--deep-15);margin-bottom:0}
.sec-header.income{border-bottom-color:var(--sage)}
.sec-header.cogs{border-bottom-color:var(--terra)}
.sec-header.gross{border-bottom-color:var(--sage)}
.sec-header.opex{border-bottom-color:var(--amber)}
.sec-header.total{border-bottom-color:var(--deep)}
.sec-header h2{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;flex:1}
.sec-copy{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:0.08em;color:var(--deep-30);background:transparent;border:1px solid var(--deep-08);border-radius:4px;padding:4px 10px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.sec-copy:hover{color:var(--sage);border-color:var(--sage)}
.sec-copy.copied{color:white;background:var(--sage);border-color:var(--sage)}

/* Sub-section label */
.sub-label{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--amber);padding:16px 0 6px;font-weight:700}

/* Annotation card */
.ann{position:relative;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:12px;padding:16px 20px;margin:6px 0;transition:border-color 0.15s,box-shadow 0.15s}
.ann:hover{border-color:var(--glass-border-strong);box-shadow:0 2px 12px rgba(44,36,24,0.04)}
.ann-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
.ann-name{font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;color:var(--deep);flex:1}
.ann-name .excel-row{font-family:'Space Mono',monospace;font-size:10px;color:var(--deep-30);font-weight:400;margin-left:6px}
.ann-copy{width:28px;height:28px;border-radius:6px;border:1px solid var(--deep-08);background:transparent;color:var(--deep-30);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.15s;flex-shrink:0}
.ann-copy:hover{color:var(--sage);border-color:var(--sage);background:rgba(139,158,124,0.06)}
.ann-copy.copied{color:white;background:var(--sage);border-color:var(--sage)}

.ann-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ann-field{}
.ann-field-label{font-family:'Space Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:0.12em;color:var(--amber);margin-bottom:2px;font-weight:700}
.ann-field-text{font-size:13px;color:var(--deep-70);line-height:1.5}
.ann-field-text code{font-family:'Space Mono',monospace;font-size:11px;background:rgba(196,149,106,0.1);padding:1px 5px;border-radius:3px;color:var(--deep)}

.ann-tip{margin-top:8px;padding:8px 12px;background:rgba(139,158,124,0.07);border-radius:8px;border-left:3px solid var(--sage)}
.ann-tip-label{font-family:'Space Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:0.12em;color:var(--sage);margin-bottom:2px;font-weight:700}
.ann-tip-text{font-size:12px;color:var(--deep-70);line-height:1.5}

/* Total / summary rows */
.ann.is-total{background:var(--glass-strong);border-color:var(--glass-border-strong)}
.ann.is-grand{background:rgba(196,149,106,0.08);border:2px solid var(--amber)}

/* Value preview */
.ann-values{margin-top:8px;padding:6px 0 0;border-top:1px solid var(--deep-08)}
.ann-values-label{font-family:'Space Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:0.1em;color:var(--deep-30);margin-bottom:4px;font-weight:700}
.val-row{display:flex;gap:2px;flex-wrap:wrap}
.val-cell{font-family:'Space Mono',monospace;font-size:10px;padding:2px 6px;border-radius:3px;background:rgba(44,36,24,0.03);color:var(--deep-70);min-width:52px;text-align:right}
.val-cell.neg{color:var(--negative)}
.val-cell.zero{color:var(--deep-15)}
.val-cell.head{color:var(--deep-50);background:transparent;font-weight:700;font-size:9px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--deep);color:var(--cream);padding:12px 24px;border-radius:10px;font-size:13px;font-weight:500;z-index:1000;transition:transform 0.25s ease;box-shadow:0 8px 32px rgba(44,36,24,0.3)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Utility */
.mt-sm{margin-top:8px}
.mb-lg{margin-bottom:32px}

/* Print */
@media print{
  body::before,.nav,.btn,.ann-copy,.sec-copy,.toast{display:none}
  .ann{break-inside:avoid;border:1px solid #ddd}
}
</style>
</head>

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
let showValues = false;

function render() {
  const root = document.getElementById('annotations-root');
  let html = '';

  DATA.forEach((item, idx) => {
    if (item.type === 'section') {
      html += `<div class="sec-header ${item.cls || ''}">
        <h2>${item.label}</h2>
        <button class="sec-copy" onclick="copySection('${item.id}',this)">copy section</button>
      </div>`;
    } else if (item.type === 'sub') {
      html += `<div class="sub-label">${item.label}</div>`;
    } else if (item.type === 'ann') {
      const cls = item.grand ? 'ann is-grand' : item.total ? 'ann is-total' : 'ann';
      html += `<div class="${cls}" data-id="${item.id}" id="card-${item.id}">`;
      html += `<div class="ann-top">`;
      html += `<div class="ann-name">${item.name}${item.excel ? '<span class="excel-row">' + item.excel + '</span>' : ''}</div>`;
      html += `<button class="ann-copy" onclick="copyCard('${item.id}',this)" title="Copy this annotation">⧉</button>`;
      html += `</div>`;
      html += `<div class="ann-grid">`;
      html += `<div class="ann-field"><div class="ann-field-label">What it is</div><div class="ann-field-text">${item.what}</div></div>`;
      html += `<div class="ann-field"><div class="ann-field-label">Formula</div><div class="ann-field-text">${item.formula}</div></div>`;
      html += `</div>`;
      html += `<div class="ann-tip"><div class="ann-tip-label">Investor tip</div><div class="ann-tip-text">${item.tip}</div></div>`;

      // Values row (hidden by default)
      if (item.values) {
        html += `<div class="ann-values" style="display:${showValues ? 'block' : 'none'}">`;
        html += `<div class="ann-values-label">24-Month Values <button class="ann-copy" style="width:20px;height:20px;font-size:10px;display:inline-flex;vertical-align:middle;margin-left:4px" onclick="copyValues('${item.id}',this)" title="Copy values only">⧉</button></div>`;
        html += `<div class="val-row">`;
        item.values.forEach((v, i) => {
          const vcls = v === 0 ? 'val-cell zero' : v < 0 ? 'val-cell neg' : 'val-cell';
          html += `<span class="${vcls}">M${i+1}: ${fmtNum(v)}</span>`;
        });
        const total = item.values.reduce((s,v) => s+v, 0);
        html += `<span class="val-cell" style="font-weight:700;background:rgba(196,149,106,0.08)">TOT: ${fmtNum(total)}</span>`;
        html += `</div></div>`;
      }

      html += `</div>`;
    }
  });

  root.innerHTML = html;
}

// ══════════════════════════════════════════════
// COPY FUNCTIONS
// ══════════════════════════════════════════════

function copyCard(id, btn) {
  const item = DATA.find(d => d.id === id);
  if (!item) return;
  const text = formatCard(item);
  clipCopy(text, btn, 'Annotation copied');
}

function copyValues(id, btn) {
  const item = DATA.find(d => d.id === id);
  if (!item || !item.values) return;
  // TSV: label then 24 values then total
  const total = item.values.reduce((s,v) => s+v, 0);
  let tsv = item.name;
  item.values.forEach(v => tsv += '\t' + Math.round(v));
  tsv += '\t' + Math.round(total);
  clipCopy(tsv, btn, 'Values copied (paste into Excel)');
}

function copySection(secId, btn) {
  const items = getSectionItems(secId);
  let text = '';
  items.forEach(item => {
    if (item.type === 'sub') {
      text += '\n── ' + item.label.toUpperCase() + ' ──\n\n';
    } else if (item.type === 'ann') {
      text += formatCard(item) + '\n\n';
    }
  });
  clipCopy(text.trim(), btn, 'Section copied');
}

function copyAll() {
  let text = 'ALCHE P&L — FULL ANNOTATION LAYER\n';
  text += '═'.repeat(50) + '\n\n';

  DATA.forEach(item => {
    if (item.type === 'section') {
      text += '\n' + '═'.repeat(50) + '\n';
      text += item.label.toUpperCase() + '\n';
      text += '═'.repeat(50) + '\n\n';
    } else if (item.type === 'sub') {
      text += '── ' + item.label.toUpperCase() + ' ──\n\n';
    } else if (item.type === 'ann') {
      text += formatCard(item) + '\n\n';
    }
  });

  clipCopy(text.trim(), null, 'Full annotation layer copied');
}

function formatCard(item) {
  let t = '';
  if (item.total || item.grand) t += '★ ';
  t += item.name;
  if (item.excel) t += '  [' + item.excel + ']';
  t += '\n';
  t += '  WHAT: ' + stripHtml(item.what) + '\n';
  t += '  FORMULA: ' + stripHtml(item.formula) + '\n';
  t += '  INVESTOR TIP: ' + stripHtml(item.tip);
  if (item.values) {
    const total = item.values.reduce((s,v) => s+v, 0);
    t += '\n  M1: ' + fmtNum(item.values[0]) + ' | M12: ' + fmtNum(item.values[11]) + ' | M24: ' + fmtNum(item.values[23]) + ' | TOTAL: ' + fmtNum(total);
  }
  return t;
}

function stripHtml(s) {
  return s.replace(/<[^>]+>/g, '').replace(/&mdash;/g, '—').replace(/&times;/g, '×');
}

function fmtNum(n) {
  if (n === 0) return '0';
  const neg = n < 0;
  const abs = Math.abs(Math.round(n));
  const s = abs.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return (neg ? '-' : '') + s;
}

function getSectionItems(secId) {
  const items = [];
  let capturing = false;
  for (const item of DATA) {
    if (item.type === 'section' && item.id === secId) { capturing = true; continue; }
    if (item.type === 'section' && capturing) break;
    if (capturing) items.push(item);
  }
  return items;
}

// ══════════════════════════════════════════════
// UI UTILITIES
// ══════════════════════════════════════════════

function toggleValues() {
  showValues = !showValues;
  const btn = document.getElementById('toggle-values');
  btn.textContent = showValues ? 'Hide Values' : 'Show Values';
  btn.classList.toggle('active', showValues);
  document.querySelectorAll('.ann-values').forEach(el => {
    el.style.display = showValues ? 'block' : 'none';
  });
}

function clipCopy(text, btn, msg) {
  navigator.clipboard.writeText(text).then(() => {
    flash(btn); toast(msg);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    flash(btn); toast(msg);
  });
}

function flash(btn) {
  if (!btn) return;
  btn.classList.add('copied');
  const orig = btn.textContent;
  btn.textContent = '✓';
  setTimeout(() => { btn.classList.remove('copied'); btn.textContent = orig; }, 1500);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
render();
</script>
