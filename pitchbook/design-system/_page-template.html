    <!-- ──────────────────────────────────────────────────────────

         DATA:
           .kpi-row            — big number + label + source
           .kpi-grid           — grid of KPI cards (--2, --3, --4)

           .prose              — body text container (max-width)
           .pull-quote         — editorial pull quote
           .callout            — bordered callout boxes
           .sidebar            — glass sidebar for callouts
           .sources            — source citation block

         LAYOUT:
           .two-col            — 2-column grid
           .three-col          — 3-column grid
           .four-col           — 4-column grid
           .two-col--wide-left — 2:1 ratio grid
           .two-col--wide-right— 1:2 ratio grid

           .persona-card       — for Who We Serve section
           .competitor-row     — for competitive comparison
           .timeline           — vertical timeline with dots
           .section-label      — 10px uppercase amber label
           .sep                — horizontal divider

         UTILITIES:
           .text-amber, .text-sage, .text-terra, .text-rose, .text-stone
           .font-serif, .font-sans, .font-mono
           .text-xs through .text-3xl
           .mb-0 through .mb-12, .mt-0 through .mt-12
           .text-center, .text-right
